name: IRIS

options:
  bundleIdPrefix: com.iris
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Local-dev signing; the app spawns subprocesses and captures the screen,
    # so the sandbox is disabled via IRIS.entitlements (see plan.md fix #3).
    #
    # IMPORTANT: sign with a STABLE Apple Development identity (not ad-hoc "-").
    # Ad-hoc signing makes the codesign "designated requirement" a per-build cdhash,
    # so every rebuild looks like a new app to macOS TCC and re-prompts for Mic /
    # Screen Recording every launch. A real signing identity keys TCC to the cert +
    # bundle id, so granted permissions persist across rebuilds.
    # Manual signing with a Development cert already in the keychain — macOS apps can
    # be signed and run locally without a provisioning profile, and this keeps the
    # codesign identity stable across rebuilds so TCC permissions persist (ad-hoc "-"
    # signing changes the cdhash every build, which makes macOS re-prompt for Mic /
    # Screen Recording on every launch). Sign by the cert SHA-1 so the name/team can't
    # drift, and disable the development-profile requirement (not needed for a local app).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "D9280BD59FC5E00B14EA754F9759C308C361E5C2"
    DEVELOPMENT_TEAM: "2ZY9CXJ2SP"
    PROVISIONING_PROFILE_SPECIFIER: ""
    CODE_SIGNING_REQUIRES_DEVELOPMENT_PROFILE: NO
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: NO

targets:
  IRIS:
    type: application
    platform: macOS
    sources:
      - path: IRIS
    settings:
      base:
        PRODUCT_NAME: IRIS
        PRODUCT_BUNDLE_IDENTIFIER: com.iris.app
        INFOPLIST_FILE: IRIS/Info.plist
        CODE_SIGN_ENTITLEMENTS: IRIS/IRIS.entitlements
        # Menu-bar / accessory app — no dock icon (LSUIElement also set in Info.plist).
        LSUIElement: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
