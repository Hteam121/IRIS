name: IRIS

options:
  bundleIdPrefix: com.iris
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Local-dev signing; the app spawns subprocesses and captures the screen,
    # so the sandbox is disabled via IRIS.entitlements (see plan.md fix #3).
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

targets:
  IRIS:
    type: application
    platform: macOS
    sources:
      - path: IRIS
    settings:
      base:
        PRODUCT_NAME: IRIS
        PRODUCT_BUNDLE_IDENTIFIER: com.iris.app
        INFOPLIST_FILE: IRIS/Info.plist
        CODE_SIGN_ENTITLEMENTS: IRIS/IRIS.entitlements
        # Menu-bar / accessory app — no dock icon (LSUIElement also set in Info.plist).
        LSUIElement: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
